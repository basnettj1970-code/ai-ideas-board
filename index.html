<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ideas Board</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#faf9f6;color:#1a1a18;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e5e5e0;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:500;flex-shrink:0}
.logo-icon{width:34px;height:34px;background:#1d6e5e;border-radius:8px;display:flex;align-items:center;justify-content:center}
.header-right{display:flex;align-items:center;gap:8px}
main{max-width:1100px;margin:0 auto;padding:2rem 24px 4rem}
/* Buttons */
.btn{font-family:inherit;font-size:14px;font-weight:500;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;line-height:1}
.btn-green{background:#1d6e5e;color:#fff}
.btn-green:hover{background:#155046}
.btn-outline{background:#fff;color:#5c5c58;border:1px solid #e0e0db}
.btn-outline:hover{background:#f5f5f2}
.btn-red{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}
.btn-red:hover{background:#fecaca}
.btn-sm{padding:6px 12px;font-size:13px}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* Cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1rem;margin-top:1rem}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s;display:flex;flex-direction:column}
.card:hover{border-color:#aaa;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.card-img{width:100%;height:160px;object-fit:cover;display:block;background:#f0eeea;flex-shrink:0}
.card-body{padding:1rem 1.1rem;display:flex;flex-direction:column;flex:1}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;display:inline-block}
.tag-subject{background:#e8f4f1;color:#155046}
.tag-category{background:#ede9fe;color:#5b21b6}
.card-title{font-size:15px;font-weight:500;margin-bottom:5px;line-height:1.35}
.card-desc{font-size:13px;color:#5c5c58;line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px;flex:1}
.card-footer{display:flex;align-items:center;gap:8px;padding-top:10px;border-top:1px solid #f0efea;margin-top:auto}
.avatar{border-radius:50%;background:#d9eef9;color:#1a5f8a;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0;text-transform:uppercase}
/* Filters */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;align-items:center}
.filter-group{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:12px;font-weight:500;color:#969690;text-transform:uppercase;letter-spacing:.05em;margin-right:2px}
.pill{font-family:inherit;font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;cursor:pointer;border:1px solid #e0e0db;background:transparent;color:#5c5c58;white-space:nowrap}
.pill:hover{border-color:#aaa}
.pill.active-subject{background:#1d6e5e;color:#fff;border-color:#1d6e5e}
.pill.active-category{background:#7c3aed;color:#fff;border-color:#7c3aed}
/* Search */
.search-wrap{position:relative;margin-bottom:1rem}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none}
.search-input{font-family:inherit;font-size:14px;padding:10px 12px 10px 36px;border:1px solid #ddd;border-radius:8px;width:100%;outline:none;background:#fff;color:#1a1a18}
.search-input:focus{border-color:#1d6e5e;box-shadow:0 0 0 3px rgba(29,110,94,.1)}
/* Form */
.form-wrap{max-width:560px}
.form-group{margin-bottom:1.1rem}
label{display:block;font-size:13px;font-weight:500;color:#5c5c58;margin-bottom:6px}
input[type=text],input[type=password],textarea,select{width:100%;font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a18;outline:none}
input[type=text]:focus,input[type=password]:focus,textarea:focus,select:focus{border-color:#1d6e5e;box-shadow:0 0 0 3px rgba(29,110,94,.1)}
textarea{resize:vertical;line-height:1.65}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.upload-btn{font-family:inherit;font-size:13px;padding:8px 14px;border:1px dashed #ccc;border-radius:8px;cursor:pointer;color:#5c5c58;background:transparent;display:inline-flex;align-items:center;gap:6px}
.upload-btn:hover{border-color:#1d6e5e;color:#1d6e5e}
.file-chip{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#e8f4f1;border-radius:8px;font-size:13px;color:#155046}
.remove-btn{margin-left:auto;font-size:12px;font-family:inherit;background:transparent;border:1px solid currentColor;border-radius:4px;padding:2px 8px;cursor:pointer;flex-shrink:0}
.error-box{padding:10px 14px;background:#fdf0f0;color:#b91c1c;border-radius:8px;font-size:13px;margin-top:12px}
.success-box{padding:10px 14px;background:#f0fdf4;color:#166534;border-radius:8px;font-size:13px;margin-top:12px}
.hint{font-size:12px;color:#969690;margin-top:5px}
/* Misc */
.back-btn{font-family:inherit;font-size:14px;color:#5c5c58;background:none;border:none;cursor:pointer;padding:0;margin-bottom:1.5rem;display:flex;align-items:center;gap:4px}
.back-btn:hover{color:#1a1a18}
.empty{text-align:center;padding:4rem 2rem;color:#5c5c58}
.empty h3{font-size:18px;font-weight:500;margin-bottom:6px;color:#1a1a18}
.detail-img{width:100%;max-height:400px;object-fit:cover;border-radius:12px;display:block;margin-bottom:1.5rem}
.divider{border:none;border-top:1px solid #f0efea;margin:1.5rem 0}
/* Admin badge */
.admin-badge{font-size:12px;font-weight:500;padding:3px 10px;background:#fef9c3;color:#854d0e;border-radius:20px;border:1px solid #fde047}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:#fff;border-radius:12px;padding:1.5rem;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h3{font-size:17px;font-weight:500;margin-bottom:4px}
.modal p{font-size:13px;color:#5c5c58;margin-bottom:1rem}
@media(max-width:500px){.form-row{grid-template-columns:1fr}.header-right .btn-outline{display:none}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="9,2 16,6 9,10 2,6"/><polyline points="2,10 9,14 16,10"/>
      </svg>
    </div>
    AI Ideas Board
  </div>
  <div class="header-right">
    <button class="btn btn-outline btn-sm" id="adminBtn">🔒 Admin</button>
    <button class="btn btn-green" id="shareBtn">+ Share an idea</button>
  </div>
</header>

<!-- Admin login modal -->
<div class="modal-overlay" id="adminModal" style="display:none">
  <div class="modal">
    <h3 id="modalTitle">Admin login</h3>
    <p id="modalDesc">Enter the admin password to edit or delete ideas.</p>
    <input type="password" id="adminPwInput" placeholder="Password" style="margin-bottom:8px">
    <div id="adminPwErr" style="color:#b91c1c;font-size:13px;margin-bottom:8px"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-green" style="flex:1" id="adminLoginBtn">Log in</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<main id="main"></main>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
var DB = "https://dh-ai-ideas-default-rtdb.europe-west1.firebasedatabase.app";
var ADMIN_PASSWORD = "downe2025"; // ← Change this to whatever you like
// ────────────────────────────────────────────────────────────────

var SUBJECTS = [
  "General","Art & Design","Biology","Chemistry","Classics","Computing","Design Technology",
  "Drama","Economics","English","Geography","History","Languages","Mathematics",
  "Music","PE","Physics","PSHE","Psychology","Religious Studies","Science","SEN, LS & EAL","Sixth Form","Sociology"
];

var CATEGORIES = [
  "All types","Feedback","Critiquing Output","Prompt Writing","Lesson Planning",
  "Differentiation","Assessment","Research","Creative Writing","Marking",
  "Revision","Discussion Starter","Resource Creation","Scaffolding","Other"
];

var ideas = [];
var isAdmin = false;
var filterSubject = "All";
var filterCategory = "All types";
var searchVal = "";
var imgData = null;
var fileData = null;
var fileInfo = null;

// ── Firebase ────────────────────────────────────────────────────
function fbGet(){ return fetch(DB+"/ideas.json").then(function(r){return r.json();}); }
function fbSave(idea){
  return fetch(DB+"/ideas/"+idea.id+".json",{
    method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(idea)
  }).then(function(r){if(!r.ok)throw new Error("Save failed");});
}
function fbDelete(id){
  return fetch(DB+"/ideas/"+id+".json",{method:"DELETE"})
    .then(function(r){if(!r.ok)throw new Error("Delete failed");});
}

// ── Helpers ─────────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmtDate(iso){return new Date(iso).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});}
function initials(name){
  var p=(name||"A").trim().split(" ").filter(Boolean);
  return(p.length>=2?p[0][0]+p[p.length-1][0]:name.slice(0,2)).toUpperCase();
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function loadIdeas(){
  fbGet().then(function(data){
    ideas=[];
    if(data&&typeof data==="object"){
      Object.values(data).forEach(function(v){if(v)ideas.push(v);});
      ideas.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
    }
    renderBrowse();
  }).catch(function(){ideas=[];renderBrowse();});
}

// ── Browse ──────────────────────────────────────────────────────
function showBrowse(){renderBrowse();window.scrollTo(0,0);}

function renderBrowse(){
  var adminBar=isAdmin?'<div style="margin-bottom:1rem;padding:8px 14px;background:#fef9c3;border-radius:8px;font-size:13px;color:#854d0e;display:flex;align-items:center;gap:10px">'+
    '<span>🔓 Admin mode — you can edit and delete ideas</span>'+
    '<button class="btn btn-outline btn-sm" style="margin-left:auto" onclick="logoutAdmin()">Log out</button></div>':"";

  var subjects=["All"].concat(SUBJECTS);
  var subjectPills=subjects.map(function(s){
    var active=filterSubject===s;
    return '<button class="pill subject-pill'+(active?" active-subject":"")+'" data-val="'+esc(s)+'">'+esc(s)+'</button>';
  }).join("");

  var catPills=CATEGORIES.map(function(c){
    var active=filterCategory===c;
    return '<button class="pill cat-pill'+(active?" active-category":"")+'" data-val="'+esc(c)+'">'+esc(c)+'</button>';
  }).join("");

  document.getElementById("main").innerHTML=
    adminBar+
    '<p style="font-size:14px;color:#5c5c58;margin-bottom:1.25rem">A shared space for AI lesson ideas from our team</p>'+
    '<div class="search-wrap">'+
      '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.4"/><path d="M10 10l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>'+
      '<input id="searchBox" class="search-input" placeholder="Search by title, description, subject or author..." value="'+esc(searchVal)+'">'+
    '</div>'+
    '<div style="margin-bottom:.75rem">'+
      '<div style="font-size:12px;font-weight:500;color:#969690;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Subject</div>'+
      '<div id="subjectPills" style="display:flex;gap:5px;flex-wrap:wrap">'+subjectPills+'</div>'+
    '</div>'+
    '<div style="margin-bottom:1.25rem">'+
      '<div style="font-size:12px;font-weight:500;color:#969690;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Type of AI use</div>'+
      '<div id="catPills" style="display:flex;gap:5px;flex-wrap:wrap">'+catPills+'</div>'+
    '</div>'+
    '<p id="countLine" style="font-size:13px;color:#969690;margin-bottom:1rem"></p>'+
    '<div id="results"></div>';

  // Search
  document.getElementById("searchBox").addEventListener("input",function(){
    searchVal=this.value; renderResults();
  });

  // Subject pills — event delegation
  document.getElementById("subjectPills").addEventListener("click",function(e){
    var btn=e.target.closest(".subject-pill");
    if(!btn)return;
    filterSubject=btn.dataset.val;
    Array.from(this.querySelectorAll(".subject-pill")).forEach(function(b){
      b.className="pill subject-pill"+(b.dataset.val===filterSubject?" active-subject":"");
    });
    renderResults();
  });

  // Category pills — event delegation
  document.getElementById("catPills").addEventListener("click",function(e){
    var btn=e.target.closest(".cat-pill");
    if(!btn)return;
    filterCategory=btn.dataset.val;
    Array.from(this.querySelectorAll(".cat-pill")).forEach(function(b){
      b.className="pill cat-pill"+(b.dataset.val===filterCategory?" active-category":"");
    });
    renderResults();
  });

  renderResults();
}

function renderResults(){
  var visible=ideas.filter(function(i){
    var q=searchVal.toLowerCase();
    var mq=!q||[i.title,i.desc,i.subject,i.category,i.author].some(function(x){return(x||"").toLowerCase().includes(q);});
    var ms=filterSubject==="All"||i.subject===filterSubject;
    var mc=filterCategory==="All types"||i.category===filterCategory;
    return mq&&ms&&mc;
  });
  var html=visible.length===0
    ?'<div class="empty"><h3>'+(ideas.length===0?'No ideas yet — be the first!':'No results')+'</h3><p>'+(ideas.length===0?'Click “+ Share an idea” to add yours.':'Try adjusting your search or filters.')+'</p></div>'
    :'<div class="grid">'+visible.map(cardHtml).join("")+'</div>';
  var c=document.getElementById("countLine");
  var r=document.getElementById("results");
  if(c)c.textContent=visible.length+' idea'+(visible.length!==1?'s':'');
  if(r)r.innerHTML=html;
}

function setSubject(v){filterSubject=v;renderResults();}
function setCategory(v){filterCategory=v;renderResults();}

function cardHtml(idea){
  var img=idea.imgUrl?'<img class="card-img" src="'+esc(idea.imgUrl)+'" alt="" onerror="this.style.display=\'none\'">':'';
  var adminBtns=isAdmin
    ?'<div style="display:flex;gap:6px;margin-top:10px">'+
      '<button class="btn btn-outline btn-sm" style="font-size:12px" onclick="event.stopPropagation();editIdea(\''+idea.id+'\')">✏️ Edit</button>'+
      '<button class="btn btn-red btn-sm" style="font-size:12px" onclick="event.stopPropagation();deleteIdea(\''+idea.id+'\')">🗑 Delete</button>'+
      '</div>':''
  return '<div class="card" onclick="showDetail(\''+idea.id+'\')">'+img+
    '<div class="card-body">'+
    '<div class="tags">'+
      '<span class="tag tag-subject">'+esc(idea.subject||"General")+'</span>'+
      (idea.category?'<span class="tag tag-category">'+esc(idea.category)+'</span>':'')+
    '</div>'+
    '<div class="card-title">'+esc(idea.title)+'</div>'+
    '<div class="card-desc">'+esc(idea.desc)+'</div>'+
    '<div class="card-footer">'+
      '<div class="avatar" style="width:28px;height:28px;font-size:10px">'+initials(idea.author||"A")+'</div>'+
      '<div><div style="font-size:12px;font-weight:500">'+esc(idea.author||"Anonymous")+'</div>'+
      '<div style="font-size:11px;color:#969690">'+fmtDate(idea.date)+'</div></div>'+
    '</div>'+
    adminBtns+
    '</div></div>';
}

// ── Detail ──────────────────────────────────────────────────────
function showDetail(id){
  var idea=ideas.find(function(i){return i.id===id;});
  if(!idea){showBrowse();return;}
  var img=idea.imgUrl?'<img class="detail-img" src="'+esc(idea.imgUrl)+'" alt="">':'';
  var fileBtn=idea.file?'<div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid #f0efea">'+
    '<p style="font-size:12px;font-weight:500;color:#969690;margin-bottom:8px;letter-spacing:.05em">ATTACHMENT</p>'+
    '<button class="btn btn-outline" onclick="dlFile(\''+id+'\')">⬇ '+esc(idea.file.name)+'</button></div>':'';
  var adminBtns=isAdmin?'<div style="display:flex;gap:8px;margin-top:1.5rem;padding-top:1rem;border-top:1px solid #f0efea">'+
    '<button class="btn btn-outline" onclick="editIdea(\''+id+'\')">✏️ Edit idea</button>'+
    '<button class="btn btn-red" onclick="deleteIdea(\''+id+'\')">🗑 Delete idea</button></div>':'';

  document.getElementById("main").innerHTML=
    '<button class="back-btn" onclick="showBrowse()">← Back to all ideas</button>'+
    '<div style="max-width:720px">'+img+
    '<div class="tags" style="margin-bottom:10px">'+
      '<span class="tag tag-subject">'+esc(idea.subject||"General")+'</span>'+
      (idea.category?'<span class="tag tag-category">'+esc(idea.category)+'</span>':'')+
    '</div>'+
    '<h2 style="font-size:22px;font-weight:500;margin-bottom:1rem;line-height:1.3">'+esc(idea.title)+'</h2>'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #f0efea">'+
      '<div class="avatar" style="width:36px;height:36px;font-size:13px">'+initials(idea.author||"A")+'</div>'+
      '<div><div style="font-size:14px;font-weight:500">'+esc(idea.author||"Anonymous")+'</div>'+
      '<div style="font-size:13px;color:#5c5c58">'+fmtDate(idea.date)+'</div></div>'+
    '</div>'+
    '<div style="font-size:15px;line-height:1.85;white-space:pre-wrap;color:#1a1a18">'+esc(idea.desc)+'</div>'+
    fileBtn+adminBtns+'</div>';
  window.scrollTo(0,0);
}

function dlFile(id){
  var idea=ideas.find(function(i){return i.id===id;});
  if(!idea||!idea.file)return;
  var a=document.createElement("a");a.href=idea.file.data;a.download=idea.file.name;a.click();
}

// ── Submit / Edit ───────────────────────────────────────────────
function showSubmit(editId){
  var editing=editId?ideas.find(function(i){return i.id===editId;}):null;
  imgData=editing?editing.imgUrl||null:null;
  fileData=editing&&editing.file?editing.file.data:null;
  fileInfo=editing&&editing.file?{name:editing.file.name,type:editing.file.type}:null;

  var subjectOptions=SUBJECTS.map(function(s){
    return '<option value="'+esc(s)+'"'+(editing&&editing.subject===s?' selected':(!editing&&s==="General"?' selected':''))+'>'+esc(s)+'</option>';
  }).join("");

  var categoryOptions=CATEGORIES.filter(function(c){return c!=="All types";}).map(function(c){
    return '<option value="'+esc(c)+'"'+(editing&&editing.category===c?' selected':'')+'>'+esc(c)+'</option>';
  }).join("");

  var imgArea=imgData
    ?'<div class="file-chip" id="imgChip"><img src="'+esc(imgData)+'" style="height:48px;width:72px;object-fit:cover;border-radius:6px" alt=""><span style="flex:1">Image added</span><button class="remove-btn" onclick="clearImg()">Remove</button></div>'
    :'<button class="upload-btn" onclick="document.getElementById(\'imgFile\').click()">🖼 Upload image</button>'+
     '<input type="file" id="imgFile" accept="image/*" style="display:none" onchange="handleImg(this)">';

  var fileArea=fileInfo
    ?'<div class="file-chip" id="fileChip"><span style="flex:1">📎 '+esc(fileInfo.name)+'</span><button class="remove-btn" onclick="clearFile()">Remove</button></div>'
    :'<button class="upload-btn" onclick="document.getElementById(\'docFile\').click()">📎 Attach file</button>'+
     '<input type="file" id="docFile" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.csv" style="display:none" onchange="handleFile(this)">'+
     '<p class="hint">PDF, Word, PowerPoint etc. Max 1 MB. For larger files paste a Google Drive link in the description.</p>';

  document.getElementById("main").innerHTML=
    '<button class="back-btn" onclick="showBrowse()">← Back</button>'+
    '<h2 style="font-size:20px;font-weight:500;margin-bottom:1.5rem">'+(editing?'Edit idea':'Share an idea')+'</h2>'+
    '<div class="form-wrap">'+
      '<input type="hidden" id="editId" value="'+(editId||'')+'">'+
      '<div class="form-group"><label>Title *</label>'+
        '<input type="text" id="fTitle" placeholder="e.g. Using AI to give feedback on student writing" value="'+esc(editing?editing.title:'')+'"></div>'+
      '<div class="form-group"><label>Description *</label>'+
        '<textarea id="fDesc" rows="7" placeholder="Describe the idea, how it works in practice, what went well, tips for colleagues...">'+esc(editing?editing.desc:'')+'</textarea></div>'+
      '<div class="form-group form-row">'+
        '<div><label>Subject / area</label><select id="fSubject">'+subjectOptions+'</select></div>'+
        '<div><label>Type of AI use</label><select id="fCategory"><option value="">— choose —</option>'+categoryOptions+'</select></div>'+
      '</div>'+
      '<div class="form-group"><label>Your name</label>'+
        '<input type="text" id="fAuthor" placeholder="Anonymous if left blank" value="'+esc(editing?editing.author:'')+'"></div>'+
      '<div class="form-group"><label>Image (optional)</label><div id="imgArea">'+imgArea+'</div></div>'+
      '<div class="form-group"><label>File / document (optional)</label><div id="fileArea">'+fileArea+'</div></div>'+
      '<div id="errBox"></div>'+
      '<div style="margin-top:1.5rem;display:flex;gap:8px">'+
        '<button class="btn btn-green" style="font-size:15px;padding:10px 28px" id="postBtn" onclick="doSubmit()">'+
          (editing?'Save changes':'Post idea')+'</button>'+
        (editing?'<button class="btn btn-outline" onclick="showBrowse()">Cancel</button>':'')+
      '</div>'+
    '</div>';
  window.scrollTo(0,0);
}

function editIdea(id){showSubmit(id);}

function clearImg(){
  imgData=null;
  document.getElementById("imgArea").innerHTML=
    '<button class="upload-btn" onclick="document.getElementById(\'imgFile\').click()">🖼 Upload image</button>'+
    '<input type="file" id="imgFile" accept="image/*" style="display:none" onchange="handleImg(this)">';
}
function clearFile(){
  fileData=null;fileInfo=null;
  document.getElementById("fileArea").innerHTML=
    '<button class="upload-btn" onclick="document.getElementById(\'docFile\').click()">📎 Attach file</button>'+
    '<input type="file" id="docFile" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.csv" style="display:none" onchange="handleFile(this)">'+
    '<p class="hint">PDF, Word, PowerPoint etc. Max 1 MB.</p>';
}

function handleImg(input){
  var f=input.files[0];if(!f)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var MAX=700,w=img.width,h=img.height;
      if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}else if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      var c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      imgData=c.toDataURL("image/jpeg",0.82);
      document.getElementById("imgArea").innerHTML=
        '<div class="file-chip"><img src="'+imgData+'" style="height:48px;width:72px;object-fit:cover;border-radius:6px" alt="">'+
        '<span style="flex:1">Image added</span><button class="remove-btn" onclick="clearImg()">Remove</button></div>';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(f);
}

function handleFile(input){
  var f=input.files[0];if(!f)return;
  if(f.size>1.1*1024*1024){
    document.getElementById("errBox").innerHTML='<div class="error-box">File too large (max 1 MB). Paste a Google Drive link in the description instead.</div>';
    return;
  }
  var reader=new FileReader();
  reader.onload=function(e){
    fileData=e.target.result;fileInfo={name:f.name,type:f.type};
    document.getElementById("fileArea").innerHTML=
      '<div class="file-chip"><span style="flex:1">📎 '+esc(f.name)+'</span><button class="remove-btn" onclick="clearFile()">Remove</button></div>';
  };
  reader.readAsDataURL(f);
}

function doSubmit(){
  var title=document.getElementById("fTitle").value.trim();
  var desc=document.getElementById("fDesc").value.trim();
  var author=document.getElementById("fAuthor").value.trim();
  var subject=document.getElementById("fSubject").value;
  var category=document.getElementById("fCategory").value;
  var editId=document.getElementById("editId").value;

  if(!title||!desc){
    document.getElementById("errBox").innerHTML='<div class="error-box">Please add a title and description.</div>';
    return;
  }

  var btn=document.getElementById("postBtn");
  btn.disabled=true;btn.textContent="Saving...";
  document.getElementById("errBox").innerHTML="";

  var existing=editId?ideas.find(function(i){return i.id===editId;}):null;
  var idea={
    id:editId||uid(),
    title:title,desc:desc,
    author:author||"Anonymous",
    subject:subject||"General",
    category:category||"",
    date:existing?existing.date:new Date().toISOString(),
    imgUrl:imgData||null,
    file:fileData?{name:fileInfo.name,type:fileInfo.type,data:fileData}:null
  };

  fbSave(idea).then(function(){
    if(existing){
      var idx=ideas.indexOf(existing);
      if(idx>=0)ideas[idx]=idea;
    } else {
      ideas.unshift(idea);
    }
    showBrowse();
  }).catch(function(){
    document.getElementById("errBox").innerHTML='<div class="error-box">Could not save. Check your connection and try again.</div>';
    btn.disabled=false;btn.textContent=editId?"Save changes":"Post idea";
  });
}

function deleteIdea(id){
  if(!confirm("Delete this idea? This cannot be undone."))return;
  fbDelete(id).then(function(){
    ideas=ideas.filter(function(i){return i.id!==id;});
    showBrowse();
  }).catch(function(){alert("Could not delete. Please try again.");});
}

// ── Admin ───────────────────────────────────────────────────────
document.getElementById("adminBtn").addEventListener("click",function(){
  if(isAdmin){logoutAdmin();return;}
  document.getElementById("adminModal").style.display="flex";
  document.getElementById("adminPwInput").value="";
  document.getElementById("adminPwErr").textContent="";
  setTimeout(function(){document.getElementById("adminPwInput").focus();},50);
});

document.getElementById("adminLoginBtn").addEventListener("click",function(){
  var pw=document.getElementById("adminPwInput").value;
  if(pw===ADMIN_PASSWORD){
    isAdmin=true;
    closeModal();
    document.getElementById("adminBtn").textContent="🔓 Admin";
    renderBrowse();
  } else {
    document.getElementById("adminPwErr").textContent="Incorrect password.";
    document.getElementById("adminPwInput").select();
  }
});

document.getElementById("adminPwInput").addEventListener("keydown",function(e){
  if(e.key==="Enter")document.getElementById("adminLoginBtn").click();
});

document.getElementById("adminModal").addEventListener("click",function(e){
  if(e.target===this)closeModal();
});

function closeModal(){document.getElementById("adminModal").style.display="none";}
function logoutAdmin(){
  isAdmin=false;
  document.getElementById("adminBtn").textContent="🔒 Admin";
  renderBrowse();
}

document.getElementById("shareBtn").addEventListener("click",function(){showSubmit(null);});
document.getElementById("main").innerHTML='<p style="text-align:center;padding:3rem;color:#969690;font-size:14px">Loading ideas...</p>';
loadIdeas();
</script>
