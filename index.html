<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ideas Board — Downe House</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#faf9f6;color:#1a1a18;min-height:100vh}
header{background:#1d6e5e;padding:0 24px;position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:500;flex-shrink:0;color:#fff}
.dh-badge{width:38px;height:38px;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.35);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#fff;letter-spacing:-0.5px;flex-shrink:0}
.logo-divider{color:rgba(255,255,255,0.35);font-size:18px;font-weight:300;margin:0 2px}
.header-right{display:flex;align-items:center;gap:8px}
.section-switcher{display:flex;border-top:1px solid rgba(255,255,255,0.15);gap:0}
.switcher-btn{font-family:inherit;font-size:14px;font-weight:500;padding:10px 24px;border:none;background:transparent;cursor:pointer;color:rgba(255,255,255,0.6);border-bottom:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:6px}
.switcher-btn:hover{color:#fff}
.switcher-btn.active{color:#fff;border-bottom-color:#fff}
.btn{font-family:inherit;font-size:14px;font-weight:500;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;line-height:1;transition:background .15s}
.btn-green{background:#1d6e5e;color:#fff}.btn-green:hover{background:#155046}
.btn-blue{background:#1e40af;color:#fff}.btn-blue:hover{background:#1e3a8a}
.btn-ghost{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3)}.btn-ghost:hover{background:rgba(255,255,255,0.25)}
.btn-outline{background:#fff;color:#5c5c58;border:1px solid #e0e0db}.btn-outline:hover{background:#f5f5f2}
.btn-red{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}.btn-red:hover{background:#fecaca}
.btn-sm{padding:6px 12px;font-size:13px}
.btn:disabled{opacity:.5;cursor:not-allowed}
main{max-width:1100px;margin:0 auto;padding:2rem 24px 4rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1rem;margin-top:1rem}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s;display:flex;flex-direction:column}
.card:hover{border-color:#aaa;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.card-img{width:100%;height:160px;object-fit:cover;display:block;background:#f0eeea;flex-shrink:0}
.card-body{padding:1rem 1.1rem;display:flex;flex-direction:column;flex:1}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;display:inline-block}
.tag-sa{background:#e8f4f1;color:#155046}.tag-ca{background:#ede9fe;color:#5b21b6}
.tag-so{background:#dbeafe;color:#1e3a8a}.tag-co{background:#fef3c7;color:#92400e}
.card-title{font-size:15px;font-weight:500;margin-bottom:5px;line-height:1.35}
.card-desc{font-size:13px;color:#5c5c58;line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px;flex:1}
.card-footer{display:flex;align-items:center;gap:8px;padding-top:10px;border-top:1px solid #f0efea;margin-top:auto}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0;text-transform:uppercase}
.av-a{background:#d9eef9;color:#1a5f8a}.av-o{background:#dbeafe;color:#1e40af}
.search-wrap{position:relative;margin-bottom:1rem}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none}
.search-input{font-family:inherit;font-size:14px;padding:10px 12px 10px 36px;border:1px solid #ddd;border-radius:8px;width:100%;outline:none;background:#fff;color:#1a1a18}
.search-input:focus{border-color:#1d6e5e;box-shadow:0 0 0 3px rgba(29,110,94,.1)}
.filter-row{margin-bottom:.85rem}
.filter-label{font-size:12px;font-weight:500;color:#969690;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.pill-wrap{display:flex;gap:5px;flex-wrap:wrap}
.pill{font-family:inherit;font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;cursor:pointer;border:1px solid #e0e0db;background:transparent;color:#5c5c58;white-space:nowrap;transition:all .12s}
.pill:hover{border-color:#aaa}
.psa{background:#1d6e5e;color:#fff;border-color:#1d6e5e}.pca{background:#7c3aed;color:#fff;border-color:#7c3aed}
.pso{background:#1e40af;color:#fff;border-color:#1e40af}.pco{background:#d97706;color:#fff;border-color:#d97706}
.sort-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.sort-lbl{font-size:12px;font-weight:500;color:#969690;white-space:nowrap}
.sort-btn{font-family:inherit;font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;cursor:pointer;border:1px solid #e0e0db;background:transparent;color:#5c5c58;transition:all .12s}
.sort-btn:hover{border-color:#aaa}.sort-btn.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.rxbar{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.rxbtn{font-family:inherit;font-size:12px;font-weight:500;padding:5px 10px;border-radius:20px;cursor:pointer;border:1px solid #e0e0db;background:#fff;color:#5c5c58;display:inline-flex;align-items:center;gap:4px;transition:all .15s}
.rxbtn:hover{border-color:#aaa;background:#f5f5f2}
.rxbtn.lik{background:#fef9c3;border-color:#fcd34d;color:#92400e}
.rxbtn.tri{background:#dcfce7;border-color:#86efac;color:#166534}
.shr{font-family:inherit;font-size:12px;padding:5px 10px;border-radius:20px;cursor:pointer;border:1px solid #e0e0db;background:#fff;color:#5c5c58;display:inline-flex;align-items:center;gap:4px;transition:all .15s;margin-left:auto}
.shr:hover{border-color:#aaa;background:#f5f5f2}
.form-group{margin-bottom:1.1rem}
label{display:block;font-size:13px;font-weight:500;color:#5c5c58;margin-bottom:6px}
input[type=text],input[type=password],textarea,select{width:100%;font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a18;outline:none;transition:border-color .15s,box-shadow .15s}
input[type=text]:focus,input[type=password]:focus,textarea:focus,select:focus{border-color:#1d6e5e;box-shadow:0 0 0 3px rgba(29,110,94,.1)}
textarea{resize:vertical;line-height:1.65}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.upload-btn{font-family:inherit;font-size:13px;padding:8px 14px;border:1px dashed #ccc;border-radius:8px;cursor:pointer;color:#5c5c58;background:transparent;display:inline-flex;align-items:center;gap:6px}
.upload-btn:hover{border-color:#1d6e5e;color:#1d6e5e}
.file-chip{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:13px}
.fc-a{background:#e8f4f1;color:#155046}.fc-o{background:#dbeafe;color:#1e3a8a}
.remove-btn{margin-left:auto;font-size:12px;font-family:inherit;background:transparent;border:1px solid currentColor;border-radius:4px;padding:2px 8px;cursor:pointer;flex-shrink:0}
.err-box{padding:10px 14px;background:#fdf0f0;color:#b91c1c;border-radius:8px;font-size:13px;margin-top:12px}
.hint{font-size:12px;color:#969690;margin-top:5px;line-height:1.5}
.back-btn{font-family:inherit;font-size:14px;color:#5c5c58;background:none;border:none;cursor:pointer;padding:0;margin-bottom:1.5rem;display:flex;align-items:center;gap:4px}
.back-btn:hover{color:#1a1a18}
.empty{text-align:center;padding:4rem 2rem;color:#5c5c58}
.empty h3{font-size:18px;font-weight:500;margin-bottom:6px;color:#1a1a18}
.detail-img{width:100%;max-height:400px;object-fit:cover;border-radius:12px;display:block;margin-bottom:1.5rem;cursor:zoom-in}
.admin-bar{margin-bottom:1rem;padding:8px 14px;background:#fef9c3;border-radius:8px;font-size:13px;color:#854d0e;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:#fff;border-radius:12px;padding:1.5rem;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal h3{font-size:17px;font-weight:500;margin-bottom:4px}
.modal p{font-size:13px;color:#5c5c58;margin-bottom:1rem;line-height:1.5}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
@media(max-width:500px){.form-row{grid-template-columns:1fr}.switcher-btn{padding:10px 14px;font-size:13px}}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <div class="dh-badge">DH</div>
      <span class="logo-divider">|</span>
      AI Ideas Board
    </div>
    <div class="header-right">
      <button class="btn btn-ghost btn-sm" id="adminBtn">&#128274; Admin</button>
      <button class="btn btn-green" id="shareBtn">+ Share an idea</button>
    </div>
  </div>
  <div class="section-switcher">
    <button class="switcher-btn active" id="btnAcademic" onclick="switchSection('academic')">&#127891; Academic Staff</button>
    <button class="switcher-btn" id="btnOperational" onclick="switchSection('operational')">&#127970; Operational Staff</button>
  </div>
</header>

<div class="modal-overlay" id="adminModal" style="display:none">
  <div class="modal">
    <h3>Admin login</h3>
    <p>Enter the admin password to edit or delete any idea.</p>
    <input type="password" id="adminPwInput" placeholder="Password" style="margin-bottom:8px">
    <div id="adminPwErr" style="color:#b91c1c;font-size:13px;margin-bottom:8px;min-height:20px"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-green" style="flex:1" id="adminLoginBtn">Log in</button>
      <button class="btn btn-outline" onclick="closeAdminModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="pinModal" style="display:none">
  <div class="modal">
    <h3>Edit your idea</h3>
    <p>Enter the personal PIN you set when you posted this idea.</p>
    <input type="password" id="pinInput" placeholder="Your PIN" style="margin-bottom:8px">
    <div id="pinErr" style="color:#b91c1c;font-size:13px;margin-bottom:8px;min-height:20px"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-green" style="flex:1" id="pinConfirmBtn">Confirm</button>
      <button class="btn btn-outline" onclick="closePinModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<main id="main"><p style="text-align:center;padding:3rem;color:#969690;font-size:14px">Loading ideas&hellip;</p></main>

<script>
var DB = "https://dh-ai-ideas-default-rtdb.europe-west1.firebasedatabase.app";
var ADMIN_PASSWORD = "downe2025";

var ACADEMIC_SUBJECTS = ["Art & Design","Biology","Chemistry","Classics","Computing","Design Technology","Drama","Economics","English","Geography","History","Languages","Mathematics","Music","PE","Physics","PSHE","Psychology","Religious Studies","Science","SEN, LS & EAL","Sixth Form","Sociology"];
var ACADEMIC_CATEGORIES = ["Assessment","Creative Writing","Critiquing Output","Discussion Starter","Differentiation","Feedback","Lesson Planning","Marking","Prompt Writing","Refining Prompts","Research","Resource Creation","Revision","Scaffolding","Other"];
var OPERATIONAL_SUBJECTS = ["Admissions","Bursary","Development & Fundraising","Estates & Facilities","Finance","HR & Staffing","IT","Library","Marketing & Communications","Medical","Registrar","Senior Leadership","Other"];
var OPERATIONAL_CATEGORIES = ["Admin & Organisation","Budget & Finance","Communication","Data Sorting & Analysis","Email Drafting","Letter Writing","Meeting Notes & Minutes","Parent Correspondence","Policy & Procedures","Report Writing","Research","Scheduling & Planning","Staff Communications","Summarising Documents","Other"];

var sec = "academic";
var ideas = {academic:[],operational:[]};
var isAdmin = false;
var fSub = "All", fCat = "All types", fQ = "", fSort = "newest";
var imgData = null, fileData = null, fileInfo = null, pendingPin = null;

// Firebase
function fbGet(s){return fetch(DB+(s==="academic"?"/ideas":"/op-ideas")+".json").then(function(r){return r.json();});}
function fbSave(s,idea){
  return fetch(DB+(s==="academic"?"/ideas":"/op-ideas")+"/"+idea.id+".json",{
    method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(idea)
  }).then(function(r){if(!r.ok)throw new Error("fail");});
}
function fbDel(s,id){
  return fetch(DB+(s==="academic"?"/ideas":"/op-ideas")+"/"+id+".json",{method:"DELETE"})
    .then(function(r){if(!r.ok)throw new Error("fail");});
}

// Helpers
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmtDate(iso){return new Date(iso).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});}
function ini(name){var p=(name||"A").trim().split(" ").filter(Boolean);return(p.length>=2?p[0][0]+p[p.length-1][0]:(name||"A").slice(0,2)).toUpperCase();}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function curIdeas(){return ideas[sec];}
function curSubjects(){return sec==="academic"?ACADEMIC_SUBJECTS:OPERATIONAL_SUBJECTS;}
function curCats(){return sec==="academic"?ACADEMIC_CATEGORIES:OPERATIONAL_CATEGORIES;}
function tagS(){return sec==="academic"?"tag-sa":"tag-so";}
function tagC(){return sec==="academic"?"tag-ca":"tag-co";}
function avCls(){return sec==="academic"?"av-a":"av-o";}
function psCls(){return sec==="academic"?"psa":"pso";}
function pcCls(){return sec==="academic"?"pca":"pco";}
function btnCls(){return sec==="academic"?"btn-green":"btn-blue";}
function secDesc(){
  return sec==="academic"
    ?"The AI Ideas Board is a place for colleagues to share ideas for AI use — whether for your own admin and resource creation, or for activities undertaken in the classroom. Browse what others are trying, add your own ideas, and help build a shared picture of AI across Downe House."
    :"The AI Ideas Board is a place for operational colleagues to share how AI is helping with day-to-day tasks — from drafting communications and sorting data to planning and research. Browse ideas from across the school and add your own.";
}

function loadAll(){
  Promise.all([fbGet("academic"),fbGet("operational")]).then(function(res){
    ["academic","operational"].forEach(function(s,i){
      ideas[s]=[];
      var d=res[i];
      if(d&&typeof d==="object"){
        Object.values(d).forEach(function(v){if(v)ideas[s].push(v);});
        ideas[s].sort(function(a,b){return new Date(b.date)-new Date(a.date);});
      }
    });
    renderBrowse();
    checkUrl();
  }).catch(function(){renderBrowse();});
}

function switchSection(s){
  sec=s; fSub="All"; fCat="All types"; fQ=""; fSort="newest";
  document.getElementById("shareBtn").className="btn "+btnCls();
  document.getElementById("btnAcademic").className="switcher-btn"+(s==="academic"?" active":"");
  document.getElementById("btnOperational").className="switcher-btn"+(s==="operational"?" active":"");
  renderBrowse();
}

function showBrowse(){renderBrowse();window.scrollTo(0,0);}

function renderBrowse(){
  var ps=psCls(), pc=pcCls();
  var subs=["All"].concat(curSubjects());
  var sPills=subs.map(function(s){return '<button class="pill'+(fSub===s?" "+ps:"")+'" data-s="'+esc(s)+'">'+esc(s)+'</button>';}).join("");
  var cats=["All types"].concat(curCats());
  var cPills=cats.map(function(c){return '<button class="pill'+(fCat===c?" "+pc:"")+'" data-c="'+esc(c)+'">'+esc(c)+'</button>';}).join("");
  var adminBar=isAdmin?'<div class="admin-bar"><span>&#128275; Admin mode &mdash; you can edit and delete any idea</span><button class="btn btn-outline btn-sm" style="margin-left:auto" onclick="logoutAdmin()">Log out</button></div>':"";

  document.getElementById("main").innerHTML=
    adminBar+
    '<p style="font-size:14px;color:#5c5c58;margin-bottom:1.25rem;line-height:1.7">'+secDesc()+'</p>'+
    '<div class="search-wrap"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.4"/><path d="M10 10l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>'+
    '<input id="searchBox" class="search-input" placeholder="Search by title, description, subject or author..." value="'+esc(fQ)+'"></div>'+
    '<div class="filter-row"><div class="filter-label">'+( sec==="academic"?"Subject":"Department")+'</div><div class="pill-wrap" id="sPills">'+sPills+'</div></div>'+
    '<div class="filter-row" style="margin-bottom:1.25rem"><div class="filter-label">Type of AI use</div><div class="pill-wrap" id="cPills">'+cPills+'</div></div>'+
    '<div class="sort-bar"><span class="sort-lbl">Sort by:</span>'+
    '<button class="sort-btn'+(fSort==="newest"?" active":"")+'" data-sort="newest">Newest</button>'+
    '<button class="sort-btn'+(fSort==="liked"?" active":"")+'" data-sort="liked">&#128077; Most liked</button>'+
    '<button class="sort-btn'+(fSort==="tried"?" active":"")+'" data-sort="tried">&#10003; Most tried</button>'+
    '</div>'+
    '<p id="cntLine" style="font-size:13px;color:#969690;margin-bottom:1rem"></p>'+
    '<div id="results"></div>';

  document.getElementById("searchBox").addEventListener("input",function(){fQ=this.value;renderResults();});

  document.getElementById("sPills").addEventListener("click",function(e){
    var b=e.target.closest(".pill");if(!b)return;
    fSub=b.dataset.s;
    Array.from(this.querySelectorAll(".pill")).forEach(function(x){x.className="pill"+(x.dataset.s===fSub?" "+ps:"");});
    renderResults();
  });
  document.getElementById("cPills").addEventListener("click",function(e){
    var b=e.target.closest(".pill");if(!b)return;
    fCat=b.dataset.c;
    Array.from(this.querySelectorAll(".pill")).forEach(function(x){x.className="pill"+(x.dataset.c===fCat?" "+pc:"");});
    renderResults();
  });
  document.querySelector(".sort-bar").addEventListener("click",function(e){
    var b=e.target.closest(".sort-btn");if(!b)return;
    fSort=b.dataset.sort;
    Array.from(this.querySelectorAll(".sort-btn")).forEach(function(x){x.className="sort-btn"+(x.dataset.sort===fSort?" active":"");});
    renderResults();
  });
  renderResults();
}

function renderResults(){
  var vis=curIdeas().filter(function(i){
    var q=fQ.toLowerCase();
    var mq=!q||[i.title,i.desc,i.subject,i.category,i.author].some(function(x){return(x||"").toLowerCase().includes(q);});
    return mq&&(fSub==="All"||i.subject===fSub)&&(fCat==="All types"||i.category===fCat);
  });
  if(fSort==="liked")vis.sort(function(a,b){return(b.likes||0)-(a.likes||0);});
  else if(fSort==="tried")vis.sort(function(a,b){return(b.tried||0)-(a.tried||0);});
  var c=document.getElementById("cntLine");
  var r=document.getElementById("results");
  if(c)c.textContent=vis.length+" idea"+(vis.length!==1?"s":"");
  if(r)r.innerHTML=vis.length===0
    ?'<div class="empty"><h3>'+(curIdeas().length===0?"No ideas yet — be the first!":"No results")+"</h3><p>"+(curIdeas().length===0?"Click “+ Share an idea” to add yours.":"Try adjusting your search or filters.")+"</p></div>"
    :'<div class="grid">'+vis.map(cardHtml).join("")+"</div>";
}

function cardHtml(idea){
  var img=idea.imgUrl?'<img class="card-img" src="'+esc(idea.imgUrl)+'" alt="" onerror="this.style.display='none'">':'';
  var editBtns='';
  if(isAdmin){
    editBtns='<div style="display:flex;gap:6px;margin-top:8px">'+
      '<button class="btn btn-outline btn-sm" style="font-size:12px" onclick="event.stopPropagation();editIdea(''+idea.id+'')">&#9999;&#65039; Edit</button>'+
      '<button class="btn btn-red btn-sm" style="font-size:12px" onclick="event.stopPropagation();delIdea(''+idea.id+'')">&#128465; Delete</button></div>';
  } else if(idea.pin){
    editBtns='<div style="margin-top:8px"><button class="btn btn-outline btn-sm" style="font-size:12px" onclick="event.stopPropagation();openPin(''+idea.id+'')">&#9999;&#65039; Edit my idea</button></div>';
  }
  return '<div class="card" onclick="showDetail(''+idea.id+'')">'+img+
    '<div class="card-body">'+
    '<div class="tags"><span class="tag '+tagS()+'">'+esc(idea.subject||"General")+'</span>'+(idea.category?'<span class="tag '+tagC()+'">'+esc(idea.category)+'</span>':'')+'</div>'+
    '<div class="card-title">'+esc(idea.title)+'</div>'+
    '<div class="card-desc">'+esc(idea.desc)+'</div>'+
    '<div class="card-footer">'+
    '<div class="avatar '+avCls()+'" style="width:28px;height:28px;font-size:10px">'+ini(idea.author)+'</div>'+
    '<div><div style="font-size:12px;font-weight:500">'+esc(idea.author||"Anonymous")+'</div><div style="font-size:11px;color:#969690">'+fmtDate(idea.date)+'</div></div></div>'+
    '<div class="rxbar">'+
    '<button class="rxbtn lik" onclick="event.stopPropagation();react(''+idea.id+'','likes')">&#128077; '+(idea.likes||0)+'</button>'+
    '<button class="rxbtn tri" onclick="event.stopPropagation();react(''+idea.id+'','tried')">&#10003; '+(idea.tried||0)+' tried</button>'+
    '<button class="shr" onclick="event.stopPropagation();shareIdea(''+idea.id+'')">&#128279; Share</button>'+
    '</div>'+editBtns+'</div></div>';
}

function showDetail(id){
  var idea=curIdeas().find(function(i){return i.id===id;});
  if(!idea){showBrowse();return;}
  var img=idea.imgUrl?'<a href="'+esc(idea.imgUrl)+'" target="_blank"><img class="detail-img" src="'+esc(idea.imgUrl)+'" alt=""></a>':"";
  var fileBtn="";
  if(idea.file){
    var isPdf=idea.file.name.toLowerCase().endsWith(".pdf");
    fileBtn='<div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid #f0efea"><p style="font-size:12px;font-weight:500;color:#969690;margin-bottom:8px;letter-spacing:.05em">ATTACHMENT</p>'+
      (isPdf?'<button class="btn btn-outline" style="margin-right:8px" onclick="openFile(''+id+'')">&#128196; Open PDF</button>':'')+
      '<button class="btn btn-outline" onclick="dlFile(''+id+'')">&#11015; Download '+esc(idea.file.name)+'</button></div>';
  }
  var adminBtns="";
  if(isAdmin){
    adminBtns='<div style="display:flex;gap:8px;margin-top:1.5rem;padding-top:1rem;border-top:1px solid #f0efea">'+
      '<button class="btn btn-outline" onclick="editIdea(''+id+'')">&#9999;&#65039; Edit</button>'+
      '<button class="btn btn-red" onclick="delIdea(''+id+'')">&#128465; Delete</button></div>';
  } else if(idea.pin){
    adminBtns='<div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid #f0efea">'+
      '<button class="btn btn-outline" onclick="openPin(''+id+'')">&#9999;&#65039; Edit my idea</button></div>';
  }
  document.getElementById("main").innerHTML=
    '<button class="back-btn" onclick="showBrowse()">&#8592; Back to all ideas</button>'+
    '<div style="max-width:720px">'+img+
    '<div class="tags" style="margin-bottom:10px"><span class="tag '+tagS()+'">'+esc(idea.subject||"General")+'</span>'+(idea.category?'<span class="tag '+tagC()+'">'+esc(idea.category)+'</span>':'')+'</div>'+
    '<h2 style="font-size:22px;font-weight:500;margin-bottom:1rem;line-height:1.3">'+esc(idea.title)+'</h2>'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #f0efea">'+
    '<div class="avatar '+avCls()+'" style="width:36px;height:36px;font-size:13px">'+ini(idea.author)+'</div>'+
    '<div><div style="font-size:14px;font-weight:500">'+esc(idea.author||"Anonymous")+'</div><div style="font-size:13px;color:#5c5c58">'+fmtDate(idea.date)+'</div></div></div>'+
    '<div style="font-size:15px;line-height:1.85;white-space:pre-wrap;color:#1a1a18">'+esc(idea.desc)+'</div>'+
    '<div style="display:flex;gap:8px;margin-top:1.5rem;flex-wrap:wrap">'+
    '<button class="rxbtn lik" onclick="react(''+id+'','likes')">&#128077; '+(idea.likes||0)+' likes</button>'+
    '<button class="rxbtn tri" onclick="react(''+id+'','tried')">&#10003; '+(idea.tried||0)+' tried this</button>'+
    '<button class="shr" onclick="shareIdea(''+id+'')">&#128279; Copy link</button>'+
    '</div>'+fileBtn+adminBtns+'</div>';
  window.scrollTo(0,0);
}

function dlFile(id){var idea=curIdeas().find(function(i){return i.id===id;});if(!idea||!idea.file)return;var a=document.createElement("a");a.href=idea.file.data;a.download=idea.file.name;a.click();}
function openFile(id){var idea=curIdeas().find(function(i){return i.id===id;});if(!idea||!idea.file)return;var w=window.open();w.document.write('<iframe src="'+idea.file.data+'" style="width:100%;height:100vh;border:none"></iframe>');}

function showSubmit(editId){
  var ed=editId?curIdeas().find(function(i){return i.id===editId;}):null;
  imgData=ed?ed.imgUrl||null:null;
  fileData=ed&&ed.file?ed.file.data:null;
  fileInfo=ed&&ed.file?{name:ed.file.name,type:ed.file.type}:null;

  var sOpts=curSubjects().map(function(s){return '<option value="'+esc(s)+'"'+(ed&&ed.subject===s?" selected":"")+">"+esc(s)+"</option>";}).join("");
  var cOpts=curCats().map(function(c){return '<option value="'+esc(c)+'"'+(ed&&ed.category===c?" selected":"")+">"+esc(c)+"</option>";}).join("");
  var fc=sec==="academic"?"fc-a":"fc-o";

  var imgArea=imgData
    ?'<div class="file-chip '+fc+'" id="imgArea"><img src="'+esc(imgData)+'" style="height:48px;width:72px;object-fit:cover;border-radius:6px" alt=""><span style="flex:1">Image added</span><button class="remove-btn" onclick="clearImg()">Remove</button></div>'
    :'<div id="imgArea"><button class="upload-btn" onclick="document.getElementById('imgFile').click()">&#128444; Upload image</button><input type="file" id="imgFile" accept="image/*" style="display:none" onchange="handleImg(this)"></div>';
  var fileArea=fileInfo
    ?'<div class="file-chip '+fc+'" id="fileArea"><span style="flex:1">&#128206; '+esc(fileInfo.name)+'</span><button class="remove-btn" onclick="clearFile()">Remove</button></div>'
    :'<div id="fileArea"><button class="upload-btn" onclick="document.getElementById('docFile').click()">&#128206; Attach file</button><input type="file" id="docFile" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.csv,.xlsx" style="display:none" onchange="handleFile(this)"><p class="hint">PDF, Word, PowerPoint, Excel etc. Max 1 MB.</p></div>';

  document.getElementById("main").innerHTML=
    '<button class="back-btn" onclick="showBrowse()">&#8592; Back</button>'+
    '<h2 style="font-size:20px;font-weight:500;margin-bottom:.25rem">'+(ed?"Edit idea":"Share an idea")+'</h2>'+
    '<p style="font-size:13px;color:#969690;margin-bottom:1.5rem">'+(sec==="academic"?"Academic":"Operational")+' section</p>'+
    '<div style="max-width:560px">'+
    '<input type="hidden" id="editId" value="'+esc(editId||"")+'">'+
    '<div class="form-group"><label>Title *</label><input type="text" id="fTitle" placeholder="Give your idea a clear title" value="'+esc(ed?ed.title:"")+'"></div>'+
    '<div class="form-group"><label>Description *</label><textarea id="fDesc" rows="7" placeholder="Describe the idea, how it works, what went well, tips for colleagues...">'+esc(ed?ed.desc:"")+'</textarea></div>'+
    '<div class="form-group form-row">'+
    '<div><label>'+(sec==="academic"?"Subject":"Department")+'</label><select id="fSubject"><option value="">— choose —</option>'+sOpts+'</select></div>'+
    '<div><label>Type of AI use</label><select id="fCategory"><option value="">— choose —</option>'+cOpts+'</select></div>'+
    '</div>'+
    '<div class="form-group"><label>Your name</label><input type="text" id="fAuthor" placeholder="Anonymous if left blank" value="'+esc(ed?ed.author:"")+'"></div>'+
    '<div class="form-group">'+
    '<label>Personal edit PIN <span style="font-weight:400;color:#969690">(optional)</span></label>'+
    '<input type="password" id="fPin" placeholder="Choose a word or number you will remember">'+
    '<p class="hint">Set this if you want to edit your idea later. PINs cannot be recovered if forgotten — please make a note of it. If you need help, contact basnettj@downehouse.net</p>'+
    '</div>'+
    '<div class="form-group"><label>Image (optional)</label>'+imgArea+'</div>'+
    '<div class="form-group"><label>File / document (optional)</label>'+fileArea+'</div>'+
    '<div id="errBox"></div>'+
    '<div style="margin-top:1.5rem;display:flex;gap:8px">'+
    '<button class="btn '+btnCls()+'" style="font-size:15px;padding:10px 28px" id="postBtn" onclick="doSubmit()">'+(ed?"Save changes":"Post idea")+'</button>'+
    (ed?'<button class="btn btn-outline" onclick="showBrowse()">Cancel</button>':'')+
    '</div></div>';
  window.scrollTo(0,0);
}

function editIdea(id){showSubmit(id);}

function clearImg(){imgData=null;document.getElementById("imgArea").outerHTML='<div id="imgArea"><button class="upload-btn" onclick="document.getElementById('imgFile').click()">&#128444; Upload image</button><input type="file" id="imgFile" accept="image/*" style="display:none" onchange="handleImg(this)"></div>';}
function clearFile(){fileData=null;fileInfo=null;document.getElementById("fileArea").outerHTML='<div id="fileArea"><button class="upload-btn" onclick="document.getElementById('docFile').click()">&#128206; Attach file</button><input type="file" id="docFile" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.csv,.xlsx" style="display:none" onchange="handleFile(this)"><p class="hint">PDF, Word, PowerPoint, Excel etc. Max 1 MB.</p></div>';}

function handleImg(input){
  var f=input.files[0];if(!f)return;
  var rd=new FileReader();
  rd.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var MAX=700,w=img.width,h=img.height;
      if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}else if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      var c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
      imgData=c.toDataURL("image/jpeg",0.82);
      var fc=sec==="academic"?"fc-a":"fc-o";
      document.getElementById("imgArea").outerHTML='<div class="file-chip '+fc+'" id="imgArea"><img src="'+imgData+'" style="height:48px;width:72px;object-fit:cover;border-radius:6px" alt=""><span style="flex:1">Image added</span><button class="remove-btn" onclick="clearImg()">Remove</button></div>';
    };
    img.src=e.target.result;
  };
  rd.readAsDataURL(f);
}

function handleFile(input){
  var f=input.files[0];if(!f)return;
  if(f.size>1.1*1024*1024){document.getElementById("errBox").innerHTML='<div class="err-box">File too large (max 1 MB). Paste a Google Drive link in the description instead.</div>';return;}
  var rd=new FileReader();
  rd.onload=function(e){
    fileData=e.target.result;fileInfo={name:f.name,type:f.type};
    var fc=sec==="academic"?"fc-a":"fc-o";
    document.getElementById("fileArea").outerHTML='<div class="file-chip '+fc+'" id="fileArea"><span style="flex:1">&#128206; '+esc(f.name)+'</span><button class="remove-btn" onclick="clearFile()">Remove</button></div>';
  };
  rd.readAsDataURL(f);
}

function doSubmit(){
  var title=document.getElementById("fTitle").value.trim();
  var desc=document.getElementById("fDesc").value.trim();
  var author=document.getElementById("fAuthor").value.trim();
  var subject=document.getElementById("fSubject").value;
  var category=document.getElementById("fCategory").value;
  var pin=document.getElementById("fPin").value.trim();
  var editId=document.getElementById("editId").value;
  if(!title||!desc){document.getElementById("errBox").innerHTML='<div class="err-box">Please add a title and description.</div>';return;}
  var btn=document.getElementById("postBtn");btn.disabled=true;btn.textContent="Saving...";
  document.getElementById("errBox").innerHTML="";
  var existing=editId?curIdeas().find(function(i){return i.id===editId;}):null;
  var idea={
    id:editId||uid(),title:title,desc:desc,
    author:author||"Anonymous",subject:subject||"General",category:category||"",
    date:existing?existing.date:new Date().toISOString(),
    imgUrl:imgData||null,
    file:fileData?{name:fileInfo.name,type:fileInfo.type,data:fileData}:null,
    pin:pin||(existing?existing.pin||"":""),
    likes:existing?existing.likes||0:0,
    tried:existing?existing.tried||0:0
  };
  fbSave(sec,idea).then(function(){
    if(existing){var idx=ideas[sec].indexOf(existing);if(idx>=0)ideas[sec][idx]=idea;}
    else{ideas[sec].unshift(idea);}
    showBrowse();
  }).catch(function(){
    document.getElementById("errBox").innerHTML='<div class="err-box">Could not save. Check your connection and try again.</div>';
    btn.disabled=false;btn.textContent=editId?"Save changes":"Post idea";
  });
}

function delIdea(id){
  if(!confirm("Delete this idea? This cannot be undone."))return;
  fbDel(sec,id).then(function(){ideas[sec]=ideas[sec].filter(function(i){return i.id!==id;});showBrowse();})
    .catch(function(){alert("Could not delete. Please try again.");});
}

function react(id,field){
  var idea=curIdeas().find(function(i){return i.id===id;});
  if(!idea)return;
  idea[field]=(idea[field]||0)+1;
  fbSave(sec,idea).then(function(){
    // update just the button text without full re-render
    document.querySelectorAll(".rxbtn.lik").forEach(function(b){
      if(b.closest(".card")&&b.closest(".card").getAttribute("onclick")&&b.closest(".card").getAttribute("onclick").includes(id)){
        b.innerHTML="&#128077; "+idea.likes;
      }
    });
    document.querySelectorAll(".rxbtn.tri").forEach(function(b){
      if(b.closest(".card")&&b.closest(".card").getAttribute("onclick")&&b.closest(".card").getAttribute("onclick").includes(id)){
        b.innerHTML="&#10003; "+idea.tried+" tried";
      }
    });
    // if on detail page, update those buttons too
    var detLik=document.querySelector(".rxbtn.lik");
    var detTri=document.querySelector(".rxbtn.tri");
    if(detLik&&!detLik.closest(".card")){detLik.innerHTML="&#128077; "+idea.likes+" likes";}
    if(detTri&&!detTri.closest(".card")){detTri.innerHTML="&#10003; "+idea.tried+" tried this";}
  }).catch(function(){idea[field]=Math.max(0,(idea[field]||1)-1);});
}

function shareIdea(id){
  var url=window.location.href.split("?")[0]+"?section="+sec+"&idea="+id;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(function(){showToast("Link copied to clipboard!");});
  } else {
    var inp=document.createElement("input");inp.value=url;document.body.appendChild(inp);inp.select();document.execCommand("copy");document.body.removeChild(inp);
    showToast("Link copied to clipboard!");
  }
}

function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}

function checkUrl(){
  var p=new URLSearchParams(window.location.search);
  var s=p.get("section");var id=p.get("idea");
  if(s&&(s==="academic"||s==="operational")&&s!==sec)switchSection(s);
  if(id){var idea=curIdeas().find(function(i){return i.id===id;});if(idea)showDetail(id);}
}

function openPin(id){
  pendingPin=id;
  document.getElementById("pinInput").value="";document.getElementById("pinErr").textContent="";
  document.getElementById("pinModal").style.display="flex";
  setTimeout(function(){document.getElementById("pinInput").focus();},50);
}
function closePinModal(){document.getElementById("pinModal").style.display="none";pendingPin=null;}
document.getElementById("pinConfirmBtn").addEventListener("click",function(){
  var idea=curIdeas().find(function(i){return i.id===pendingPin;});
  if(!idea){closePinModal();return;}
  if(document.getElementById("pinInput").value.trim()===idea.pin){closePinModal();editIdea(pendingPin);}
  else{document.getElementById("pinErr").textContent="Incorrect PIN. Please try again.";document.getElementById("pinInput").select();}
});
document.getElementById("pinInput").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("pinConfirmBtn").click();});
document.getElementById("pinModal").addEventListener("click",function(e){if(e.target===this)closePinModal();});

document.getElementById("adminBtn").addEventListener("click",function(){
  if(isAdmin){logoutAdmin();return;}
  document.getElementById("adminPwInput").value="";document.getElementById("adminPwErr").textContent="";
  document.getElementById("adminModal").style.display="flex";
  setTimeout(function(){document.getElementById("adminPwInput").focus();},50);
});
document.getElementById("adminLoginBtn").addEventListener("click",function(){
  if(document.getElementById("adminPwInput").value===ADMIN_PASSWORD){
    isAdmin=true;closeAdminModal();document.getElementById("adminBtn").textContent="&#128275; Admin";renderBrowse();
  } else {
    document.getElementById("adminPwErr").textContent="Incorrect password.";document.getElementById("adminPwInput").select();
  }
});
document.getElementById("adminPwInput").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("adminLoginBtn").click();});
document.getElementById("adminModal").addEventListener("click",function(e){if(e.target===this)closeAdminModal();});
function closeAdminModal(){document.getElementById("adminModal").style.display="none";}
function logoutAdmin(){isAdmin=false;document.getElementById("adminBtn").textContent="&#128274; Admin";renderBrowse();}

document.getElementById("shareBtn").addEventListener("click",function(){showSubmit(null);});
loadAll();
</script>
</body>
</html>
