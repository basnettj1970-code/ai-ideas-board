<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ideas Board</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#faf9f6;color:#1a1a18;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e5e5e0;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:500}
.logo-icon{width:34px;height:34px;background:#1d6e5e;border-radius:8px;display:flex;align-items:center;justify-content:center}
main{max-width:1100px;margin:0 auto;padding:2rem 24px 4rem}
/* Buttons */
.btn{font-family:inherit;font-size:14px;font-weight:500;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-green{background:#1d6e5e;color:#fff}
.btn-green:hover{background:#155046}
.btn-outline{background:#fff;color:#5c5c58;border:1px solid #e0e0db}
.btn-outline:hover{background:#f5f5f2}
.btn-sm{padding:6px 12px;font-size:13px}
/* Cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1rem;margin-top:1rem}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.card:hover{border-color:#aaa;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.card-img{width:100%;height:160px;object-fit:cover;display:block;background:#f0eeea}
.card-body{padding:1rem 1.1rem}
.tag{background:#e8f4f1;color:#155046;font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:8px}
.card-title{font-size:15px;font-weight:500;margin-bottom:5px;line-height:1.35}
.card-desc{font-size:13px;color:#5c5c58;line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.card-footer{display:flex;align-items:center;gap:8px;padding-top:10px;border-top:1px solid #f0efea;margin-top:auto}
.avatar{width:28px;height:28px;border-radius:50%;background:#d9eef9;color:#1a5f8a;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;text-transform:uppercase}
/* Form */
.form-wrap{max-width:560px}
.form-group{margin-bottom:1.1rem}
label{display:block;font-size:13px;font-weight:500;color:#5c5c58;margin-bottom:6px}
input[type=text],textarea{width:100%;font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a18;outline:none}
input[type=text]:focus,textarea:focus{border-color:#1d6e5e;box-shadow:0 0 0 3px rgba(29,110,94,.1)}
textarea{resize:vertical;line-height:1.65}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.upload-btn{font-family:inherit;font-size:13px;padding:8px 14px;border:1px dashed #ccc;border-radius:8px;cursor:pointer;color:#5c5c58;background:transparent;display:inline-flex;align-items:center;gap:6px}
.upload-btn:hover{border-color:#1d6e5e;color:#1d6e5e}
.file-chip{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#e8f4f1;border-radius:8px;font-size:13px;color:#155046}
.remove-btn{margin-left:auto;font-size:12px;font-family:inherit;background:transparent;border:1px solid #155046;color:#155046;border-radius:4px;padding:2px 8px;cursor:pointer}
.error-box{padding:10px 14px;background:#fdf0f0;color:#b91c1c;border-radius:8px;font-size:13px;margin-top:12px}
/* Misc */
.back-btn{font-family:inherit;font-size:14px;color:#5c5c58;background:none;border:none;cursor:pointer;padding:0;margin-bottom:1.5rem;display:flex;align-items:center;gap:4px}
.back-btn:hover{color:#1a1a18}
.pill{font-family:inherit;font-size:12px;font-weight:500;padding:4px 14px;border-radius:20px;cursor:pointer;border:1px solid #e0e0db;background:transparent;color:#5c5c58}
.pill.active{background:#1d6e5e;color:#fff;border-color:#1d6e5e}
.search-input{font-family:inherit;font-size:14px;padding:9px 12px 9px 36px;border:1px solid #ddd;border-radius:8px;width:100%;outline:none;background:#fff}
.search-input:focus{border-color:#1d6e5e}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none}
.empty{text-align:center;padding:4rem 2rem;color:#5c5c58}
.empty h3{font-size:18px;font-weight:500;margin-bottom:6px;color:#1a1a18}
.hint{font-size:12px;color:#969690;margin-top:5px}
.detail-img{width:100%;max-height:400px;object-fit:cover;border-radius:12px;display:block;margin-bottom:1.5rem}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="9,2 16,6 9,10 2,6"/><polyline points="2,10 9,14 16,10"/>
      </svg>
    </div>
    AI Ideas Board
  </div>
  <button class="btn btn-green" id="shareBtn">+ Share an idea</button>
</header>

<main id="main"></main>

<script>
var DB = "https://dh-ai-ideas-default-rtdb.europe-west1.firebasedatabase.app";
var ideas = [];
var currentView = "browse";
var currentId = null;
var searchVal = "";
var filterVal = "All";
var imgData = null;
var fileData = null;
var fileInfo = null;

// ── Firebase ──
function fbGet() {
  return fetch(DB + "/ideas.json").then(function(r){ return r.json(); });
}
function fbSave(idea) {
  return fetch(DB + "/ideas/" + idea.id + ".json", {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(idea)
  }).then(function(r){ if(!r.ok) throw new Error("Save failed"); });
}

// ── Helpers ──
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function fmtDate(iso){ return new Date(iso).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}); }
function initials(name){
  var p = name.trim().split(" ").filter(Boolean);
  return p.length >= 2 ? (p[0][0]+p[p.length-1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
}
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function loadIdeas() {
  fbGet().then(function(data){
    ideas = [];
    if(data && typeof data === "object"){
      Object.values(data).forEach(function(v){ if(v) ideas.push(v); });
      ideas.sort(function(a,b){ return new Date(b.date)-new Date(a.date); });
    }
    renderBrowse();
  }).catch(function(){
    ideas = [];
    renderBrowse();
  });
}

// ── Views ──
function showBrowse(){
  currentView = "browse";
  renderBrowse();
  window.scrollTo(0,0);
}

function renderBrowse(){
  var subjects = ["All"];
  ideas.forEach(function(i){ if(i.subject && subjects.indexOf(i.subject)<0) subjects.push(i.subject); });

  var visible = ideas.filter(function(i){
    var q = searchVal.toLowerCase();
    var matchQ = !q || [i.title,i.desc,i.subject,i.author].some(function(x){ return (x||"").toLowerCase().includes(q); });
    var matchF = filterVal === "All" || i.subject === filterVal;
    return matchQ && matchF;
  });

  var pills = subjects.length > 2 ? '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem">' +
    subjects.map(function(s){
      return '<button class="pill'+(filterVal===s?' active':'')+'" onclick="setFilter(\''+esc(s)+'\')">'+esc(s)+'</button>';
    }).join("") + '</div>' : "";

  var cards = visible.length === 0
    ? '<div class="empty"><h3>'+(ideas.length===0?'No ideas yet — be the first!':'No results')+'</h3><p>'+(ideas.length===0?'Click "+ Share an idea" to add yours.':'Try a different search or filter.')+'</p></div>'
    : '<div class="grid">'+visible.map(cardHtml).join("")+'</div>';

  document.getElementById("main").innerHTML =
    '<p style="font-size:14px;color:#5c5c58;margin-bottom:1.5rem">A shared space for AI lesson ideas from our team</p>' +
    '<div class="search-wrap"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.4"/><path d="M10 10l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>' +
    '<input class="search-input" placeholder="Search ideas..." value="'+esc(searchVal)+'" oninput="setSearch(this.value)"></div>' +
    pills +
    '<p style="font-size:13px;color:#969690;margin-bottom:1rem">'+visible.length+' idea'+(visible.length!==1?'s':'')+'</p>' +
    cards;
}

function setSearch(v){ searchVal=v; renderBrowse(); }
function setFilter(v){ filterVal=v; renderBrowse(); }

function cardHtml(idea){
  var img = idea.imgUrl ? '<img class="card-img" src="'+esc(idea.imgUrl)+'" alt="" onerror="this.style.display=\'none\'">' : "";
  return '<div class="card" onclick="showDetail(\''+idea.id+'\')">' + img +
    '<div class="card-body"><span class="tag">'+esc(idea.subject||"General")+'</span>' +
    '<div class="card-title">'+esc(idea.title)+'</div>' +
    '<div class="card-desc">'+esc(idea.desc)+'</div>' +
    '<div class="card-footer"><div class="avatar">'+initials(idea.author||"A")+'</div>' +
    '<div><div style="font-size:12px;font-weight:500">'+esc(idea.author||"Anonymous")+'</div>' +
    '<div style="font-size:11px;color:#969690">'+fmtDate(idea.date)+'</div></div></div>' +
    '</div></div>';
}

function showDetail(id){
  currentId = id;
  currentView = "detail";
  var idea = ideas.find(function(i){ return i.id===id; });
  if(!idea){ showBrowse(); return; }
  var img = idea.imgUrl ? '<img class="detail-img" src="'+esc(idea.imgUrl)+'" alt="">' : "";
  var fileBtn = idea.file ? '<div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid #f0efea">'+
    '<p style="font-size:12px;font-weight:500;color:#969690;margin-bottom:8px;letter-spacing:.05em">ATTACHMENT</p>'+
    '<button class="btn btn-outline" onclick="dlFile(\''+id+'\')">⬇ '+esc(idea.file.name)+'</button></div>' : "";
  document.getElementById("main").innerHTML =
    '<button class="back-btn" onclick="showBrowse()">← Back to all ideas</button>' +
    '<div style="max-width:720px">'+img+
    '<span class="tag">'+esc(idea.subject||"General")+'</span>' +
    '<h2 style="font-size:22px;font-weight:500;margin:10px 0 1rem;line-height:1.3">'+esc(idea.title)+'</h2>'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #f0efea">'+
    '<div class="avatar" style="width:36px;height:36px;font-size:13px">'+initials(idea.author||"A")+'</div>'+
    '<div><div style="font-size:14px;font-weight:500">'+esc(idea.author||"Anonymous")+'</div>'+
    '<div style="font-size:13px;color:#5c5c58">'+fmtDate(idea.date)+'</div></div></div>'+
    '<div style="font-size:15px;line-height:1.85;white-space:pre-wrap">'+esc(idea.desc)+'</div>'+
    fileBtn+'</div>';
  window.scrollTo(0,0);
}

function dlFile(id){
  var idea = ideas.find(function(i){ return i.id===id; });
  if(!idea||!idea.file) return;
  var a = document.createElement("a"); a.href=idea.file.data; a.download=idea.file.name; a.click();
}

function showSubmit(){
  currentView = "submit";
  imgData = null; fileData = null; fileInfo = null;
  document.getElementById("main").innerHTML =
    '<button class="back-btn" onclick="showBrowse()">← Back</button>' +
    '<h2 style="font-size:20px;font-weight:500;margin-bottom:1.5rem">Share an idea</h2>' +
    '<div class="form-wrap">' +
      '<div class="form-group"><label>Title *</label><input type="text" id="fTitle" placeholder="e.g. Using AI to give feedback on student writing"></div>' +
      '<div class="form-group"><label>Description *</label><textarea id="fDesc" rows="7" placeholder="Describe the idea, how it works, what went well, tips for colleagues..."></textarea></div>' +
      '<div class="form-group form-row">' +
        '<div><label>Subject / area</label><input type="text" id="fSubject" placeholder="e.g. English, Maths, SEN"></div>' +
        '<div><label>Your name</label><input type="text" id="fAuthor" placeholder="Anonymous if left blank"></div>' +
      '</div>' +
      '<div class="form-group"><label>Image (optional)</label>' +
        '<div id="imgArea"><button class="upload-btn" onclick="document.getElementById(\'imgFile\').click()">🖼 Upload image</button>' +
        '<input type="file" id="imgFile" accept="image/*" style="display:none" onchange="handleImg(this)"></div>' +
      '</div>' +
      '<div class="form-group"><label>File / document (optional)</label>' +
        '<div id="fileArea"><button class="upload-btn" onclick="document.getElementById(\'docFile\').click()">📎 Attach file</button>' +
        '<input type="file" id="docFile" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.csv" style="display:none" onchange="handleFile(this)">' +
        '<p class="hint">PDF, Word, PowerPoint etc. Max 1 MB.</p></div>' +
      '</div>' +
      '<div id="errBox"></div>' +
      '<div style="margin-top:1.5rem"><button class="btn btn-green" style="font-size:15px;padding:10px 28px" id="postBtn" onclick="doSubmit()">Post idea</button></div>' +
    '</div>';
  window.scrollTo(0,0);
}

function handleImg(input){
  var f = input.files[0]; if(!f) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var MAX=700, w=img.width, h=img.height;
      if(w>h&&w>MAX){h=Math.round(h*MAX/w);w=MAX;}else if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      var c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      imgData = c.toDataURL("image/jpeg",0.82);
      document.getElementById("imgArea").innerHTML =
        '<div class="file-chip"><img src="'+imgData+'" style="height:48px;width:72px;object-fit:cover;border-radius:6px" alt="">'+
        '<span style="flex:1">Image added</span><button class="remove-btn" onclick="imgData=null;document.getElementById(\'imgArea\').innerHTML=\'<button class=\\\'upload-btn\\\' onclick=\\\'document.getElementById(\\\\\'imgFile\\\\\').click()\\\'>🖼 Upload image</button><input type=\\\'file\\\' id=\\\'imgFile\\\' accept=\\\'image/*\\\' style=\\\'display:none\\\' onchange=\\\'handleImg(this)\\\'>\';return false">Remove</button></div>';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(f);
}

function handleFile(input){
  var f = input.files[0]; if(!f) return;
  if(f.size > 1.1*1024*1024){
    document.getElementById("errBox").innerHTML='<div class="error-box">File too large (max 1 MB). Paste a Google Drive link in the description instead.</div>';
    return;
  }
  var reader = new FileReader();
  reader.onload = function(e){
    fileData = e.target.result;
    fileInfo = {name:f.name, type:f.type};
    document.getElementById("fileArea").innerHTML =
      '<div class="file-chip"><span>📎 '+esc(f.name)+'</span>'+
      '<button class="remove-btn" onclick="fileData=null;fileInfo=null;document.getElementById(\'fileArea\').innerHTML=\'<button class=\\\'upload-btn\\\' onclick=\\\'document.getElementById(\\\\\'docFile\\\\\').click()\\\'>📎 Attach file</button><input type=\\\'file\\\' id=\\\'docFile\\\' accept=\\\'.pdf,.doc,.docx,.ppt,.pptx,.txt,.csv\\\' style=\\\'display:none\\\' onchange=\\\'handleFile(this)\\\'><p class=\\\'hint\\\'>PDF, Word, PowerPoint etc. Max 1 MB.</p>\'">Remove</button></div>';
  };
  reader.readAsDataURL(f);
}

function doSubmit(){
  var title   = document.getElementById("fTitle").value.trim();
  var desc    = document.getElementById("fDesc").value.trim();
  var author  = document.getElementById("fAuthor").value.trim();
  var subject = document.getElementById("fSubject").value.trim();

  if(!title || !desc){
    document.getElementById("errBox").innerHTML='<div class="error-box">Please add a title and description.</div>';
    return;
  }

  document.getElementById("postBtn").disabled = true;
  document.getElementById("postBtn").textContent = "Saving...";
  document.getElementById("errBox").innerHTML = "";

  var idea = {
    id: uid(),
    title: title,
    desc: desc,
    author: author || "Anonymous",
    subject: subject || "General",
    date: new Date().toISOString(),
    imgUrl: imgData || null,
    file: fileData ? {name:fileInfo.name, type:fileInfo.type, data:fileData} : null
  };

  fbSave(idea).then(function(){
    ideas.unshift(idea);
    showBrowse();
  }).catch(function(){
    document.getElementById("errBox").innerHTML='<div class="error-box">Could not save. Check your connection and try again.</div>';
    document.getElementById("postBtn").disabled = false;
    document.getElementById("postBtn").textContent = "Post idea";
  });
}

// ── Start ──
document.getElementById("shareBtn").addEventListener("click", showSubmit);

document.getElementById("main").innerHTML = '<p style="text-align:center;padding:3rem;color:#969690;font-size:14px">Loading ideas...</p>';
loadIdeas();
</script>
</body>
</html>
