async function run(){
  var btn = document.getElementById("btn");
  var log = document.getElementById("log");
  btn.disabled = true;
  btn.textContent = "Uploading...";
  var ids = Object.keys(IDEAS);
  var ok = 0, fail = 0;
  for(var i=0; i<ids.length; i++){
    var idea = IDEAS[ids[i]];
    log.innerHTML += "Uploading: <em>" + idea.title + "</em>...<br>";
    try{
      var r = await fetch(DB+"/ideas/"+idea.id+".json",{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(idea)
      });
      if(r.ok){ ok++; }
      else{ fail++; log.innerHTML += '<span class="err">✗ Failed</span><br>'; }
    }catch(e){
      fail++;
      log.innerHTML += '<span class="err">✗ Error: '+e.message+'</span><br>';
    }
    window.scrollTo(0,document.body.scrollHeight);
  }
  log.innerHTML += '<br><strong class="'+(fail===0?'ok':'err')+'">Done! '+ok+' uploaded, '+fail+' failed.</strong><br>';
  if(fail===0) log.innerHTML += '<span class="ok">All ideas are now in your database. You can delete this preload.html file from GitHub.</span>';
  btn.textContent = "Complete";
}
</script>
